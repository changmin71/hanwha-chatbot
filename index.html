<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한화생명 보험 상담 챗봇</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif;
  background: #f0f2f5;
  color: #1a1a1a;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ── Brand Colors ── */
:root {
  --hw-orange: #ff6600;
  --hw-orange-dark: #e55b00;
  --hw-orange-light: #fff4ed;
  --hw-navy: #1b2a4a;
  --hw-navy-dark: #131f38;
  --hw-navy-light: #eef1f7;
  --hw-navy-accent: #3d5a99;
  --hw-gray-50: #f8f9fa;
  --hw-gray-100: #f0f2f5;
  --hw-gray-200: #e4e6ea;
  --hw-gray-300: #ccc;
  --hw-gray-600: #666;
  --hw-gray-800: #1a1a1a;
  --hw-white: #ffffff;
  --hw-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --hw-shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  /* Active theme (overridden by JS) */
  --theme-primary: var(--hw-orange);
  --theme-dark: var(--hw-orange-dark);
  --theme-light: var(--hw-orange-light);
}

/* ── Chat Container ── */
.chat-container {
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  max-height: 900px;
  background: var(--hw-white);
  display: flex;
  flex-direction: column;
  box-shadow: var(--hw-shadow-lg);
  position: relative;
}
@media (min-width: 481px) {
  .chat-container {
    height: 92dvh;
    border-radius: var(--radius);
    overflow: hidden;
  }
}

/* ── Header ── */
.chat-header {
  background: linear-gradient(135deg, var(--hw-orange), var(--hw-orange-dark));
  color: var(--hw-white);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header-avatar {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.header-info h1 { font-size: 16px; font-weight: 700; }
.header-info p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

/* ── Tab Bar ── */
.tab-bar {
  display: flex;
  background: var(--hw-white);
  border-bottom: 1px solid var(--hw-gray-200);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  padding: 12px 0;
  border: none;
  background: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--hw-gray-300);
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tab-btn.active { color: var(--theme-primary); }
.tab-btn::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2.5px;
  border-radius: 2px;
  background: transparent;
  transition: background 0.2s;
}
.tab-btn.active::after { background: var(--theme-primary); }
.tab-btn svg { width: 16px; height: 16px; }

/* ── Mode Themes ── */
.mode-customer { --theme-primary: var(--hw-orange); --theme-dark: var(--hw-orange-dark); --theme-light: var(--hw-orange-light); }
.mode-internal { --theme-primary: var(--hw-navy); --theme-dark: var(--hw-navy-dark); --theme-light: var(--hw-navy-light); }

.mode-internal .chat-header {
  background: linear-gradient(135deg, var(--hw-navy), var(--hw-navy-dark));
}
.mode-internal .msg-avatar { background: var(--hw-navy); }
.mode-internal .message.user .msg-bubble { background: var(--hw-navy); }
.mode-internal .quick-btn {
  border-color: var(--hw-navy-accent);
  color: var(--hw-navy-accent);
}
.mode-internal .quick-btn:hover,
.mode-internal .quick-btn:active {
  background: var(--hw-navy-accent);
  color: var(--hw-white);
}
.mode-internal .send-btn { background: var(--hw-navy); }
.mode-internal .send-btn:hover { background: var(--hw-navy-dark); }
.mode-internal .chat-input:focus { border-color: var(--hw-navy-accent); }
.mode-internal .tag { background: var(--hw-navy-light); color: var(--hw-navy); }
.mode-internal .product-card:hover { border-color: var(--hw-navy-accent); box-shadow: 0 2px 8px rgba(27,42,74,0.12); }
.mode-internal .product-card .card-category { color: var(--hw-navy-accent); }

/* ── Messages Area ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  background: var(--hw-gray-50);
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--hw-gray-300); border-radius: 4px; }

/* ── Message Bubbles ── */
.message { display: flex; gap: 8px; max-width: 88%; animation: fadeUp 0.25s ease; }
.message.bot { align-self: flex-start; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  background: var(--hw-orange);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: white;
  flex-shrink: 0;
  margin-top: 2px;
}
.message.user .msg-avatar { display: none; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  line-height: 1.65;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.message.bot .msg-bubble {
  background: var(--hw-white);
  border: 1px solid var(--hw-gray-200);
  border-top-left-radius: 4px;
}
.message.user .msg-bubble {
  background: var(--hw-orange);
  color: var(--hw-white);
  border-top-right-radius: 4px;
}

/* ── Typing Indicator ── */
.typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
.typing-indicator span {
  width: 7px; height: 7px;
  background: var(--hw-gray-300);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

/* ── Quick Buttons ── */
.quick-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.quick-btn {
  padding: 8px 14px;
  border: 1.5px solid var(--hw-orange);
  border-radius: 20px;
  background: var(--hw-white);
  color: var(--hw-orange);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.quick-btn:hover, .quick-btn:active {
  background: var(--hw-orange);
  color: var(--hw-white);
}

/* ── Product Card ── */
.product-card {
  background: var(--hw-white);
  border: 1px solid var(--hw-gray-200);
  border-radius: var(--radius-xs);
  padding: 14px;
  margin-top: 8px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.product-card:hover {
  border-color: var(--hw-orange);
  box-shadow: 0 2px 8px rgba(255,102,0,0.12);
}
.product-card .card-category {
  font-size: 11px;
  color: var(--hw-orange);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.product-card .card-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--hw-gray-800);
  margin-bottom: 6px;
}
.product-card .card-desc {
  font-size: 12px;
  color: var(--hw-gray-600);
  line-height: 1.5;
}

/* ── Detail Table ── */
.detail-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 12.5px;
}
.detail-table th, .detail-table td {
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--hw-gray-200);
}
.detail-table th {
  background: var(--hw-orange-light);
  color: var(--hw-orange-dark);
  font-weight: 700;
  white-space: nowrap;
}
.detail-table td { color: var(--hw-gray-800); }

/* ── Comparison Table ── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 12px;
}
.compare-table th {
  background: var(--hw-orange);
  color: white;
  padding: 8px 6px;
  font-weight: 600;
  text-align: center;
}
.compare-table td {
  padding: 8px 6px;
  text-align: center;
  border-bottom: 1px solid var(--hw-gray-200);
  font-size: 12px;
  line-height: 1.4;
}
.compare-table tr:nth-child(even) td { background: var(--hw-gray-50); }

/* ── Scenario Card ── */
.scenario-card {
  background: linear-gradient(135deg, var(--hw-orange-light), #fff);
  border: 1px solid #ffd5b8;
  border-radius: var(--radius-xs);
  padding: 14px;
  margin-top: 8px;
}
.scenario-card .sc-persona {
  font-weight: 700;
  font-size: 14px;
  color: var(--hw-orange-dark);
  margin-bottom: 6px;
}
.scenario-card .sc-bg {
  font-size: 12px;
  color: var(--hw-gray-600);
  margin-bottom: 4px;
}
.scenario-card .sc-concern {
  font-size: 13px;
  color: var(--hw-gray-800);
  font-style: italic;
  margin-bottom: 10px;
  padding: 8px;
  background: rgba(255,255,255,0.7);
  border-radius: 6px;
}
.scenario-rec {
  padding: 8px 12px;
  background: var(--hw-white);
  border-radius: 6px;
  margin-top: 6px;
  font-size: 12px;
  border-left: 3px solid var(--hw-orange);
}
.scenario-rec .rec-name { font-weight: 700; color: var(--hw-gray-800); }
.scenario-rec .rec-detail { color: var(--hw-gray-600); margin-top: 2px; }

/* ── FAQ ── */
.faq-item {
  padding: 10px 14px;
  background: var(--hw-white);
  border: 1px solid var(--hw-gray-200);
  border-radius: var(--radius-xs);
  margin-top: 6px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.faq-item:hover { border-color: var(--hw-orange); }
.faq-item .faq-q {
  font-size: 13px;
  font-weight: 600;
  color: var(--hw-orange-dark);
}

/* ── Input Area ── */
.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--hw-gray-200);
  display: flex;
  gap: 8px;
  background: var(--hw-white);
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  padding: 12px 16px;
  border: 1.5px solid var(--hw-gray-200);
  border-radius: 24px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.chat-input:focus { border-color: var(--hw-orange); }
.chat-input::placeholder { color: var(--hw-gray-300); }
.send-btn {
  width: 44px; height: 44px;
  border: none;
  background: var(--hw-orange);
  color: white;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--hw-orange-dark); }
.send-btn svg { width: 20px; height: 20px; }

/* ── Disclaimer ── */
.disclaimer {
  text-align: center;
  font-size: 11px;
  color: var(--hw-gray-300);
  padding: 6px 16px 10px;
  background: var(--hw-white);
  flex-shrink: 0;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* ── Highlight ── */
.highlight { color: var(--hw-orange-dark); font-weight: 700; }
.tag {
  display: inline-block;
  padding: 2px 8px;
  background: var(--hw-orange-light);
  color: var(--hw-orange-dark);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-right: 4px;
}

/* ── Quiz Progress Bar ── */
.quiz-progress {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 14px;
}
.quiz-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--hw-gray-200);
  border-radius: 3px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--hw-orange), var(--hw-orange-dark));
  border-radius: 3px;
  transition: width 0.4s ease;
}
.quiz-progress-text {
  font-size: 11px;
  color: var(--hw-gray-600);
  white-space: nowrap;
  font-weight: 600;
}
.quiz-step-label {
  font-size: 12px;
  color: var(--hw-orange);
  font-weight: 700;
  margin-bottom: 4px;
}

/* ── Multi-select Buttons ── */
.multi-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.multi-btn {
  padding: 8px 14px;
  border: 1.5px solid var(--hw-gray-200);
  border-radius: 20px;
  background: var(--hw-white);
  color: var(--hw-gray-800);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.multi-btn:hover { border-color: var(--hw-orange); color: var(--hw-orange); }
.multi-btn.selected {
  border-color: var(--hw-orange);
  background: var(--hw-orange);
  color: var(--hw-white);
  font-weight: 600;
}
.multi-confirm {
  margin-top: 10px;
  padding: 10px 24px;
  border: none;
  border-radius: 20px;
  background: var(--hw-orange);
  color: var(--hw-white);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
  display: none;
}
.multi-confirm.visible { display: inline-block; }
.multi-confirm:hover { background: var(--hw-orange-dark); }

/* ── Priority Tags ── */
.priority-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  margin-right: 4px;
  letter-spacing: 0.3px;
}
.priority-must { background: #ff4444; color: white; }
.priority-recommend { background: var(--hw-orange); color: white; }
.priority-optional { background: var(--hw-gray-200); color: var(--hw-gray-600); }

/* ── Profile Summary ── */
.profile-summary {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  border-radius: var(--radius-xs);
  padding: 16px;
  margin-bottom: 10px;
}
.profile-summary .ps-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 10px;
  opacity: 0.9;
}
.profile-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.profile-tag {
  padding: 4px 10px;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  font-size: 11px;
  color: rgba(255,255,255,0.9);
}

/* ── Portfolio Card ── */
.portfolio-card {
  background: var(--hw-white);
  border: 1.5px solid var(--hw-gray-200);
  border-radius: var(--radius-xs);
  padding: 14px;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}
.portfolio-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
}
.portfolio-card.must::before { background: #ff4444; }
.portfolio-card.recommend::before { background: var(--hw-orange); }
.portfolio-card.optional::before { background: var(--hw-gray-300); }
.portfolio-card .pf-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.portfolio-card .pf-name {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--hw-gray-800);
}
.portfolio-card .pf-premium {
  font-size: 13px;
  font-weight: 700;
  color: var(--hw-orange-dark);
}
.portfolio-card .pf-reason {
  font-size: 12px;
  color: var(--hw-gray-600);
  line-height: 1.5;
  margin-top: 4px;
}
.portfolio-card .pf-tip {
  font-size: 11px;
  color: var(--hw-orange);
  margin-top: 6px;
  font-weight: 600;
}

/* ── Budget Bar ── */
.budget-summary {
  background: var(--hw-orange-light);
  border: 1px solid #ffd5b8;
  border-radius: var(--radius-xs);
  padding: 14px;
  margin-top: 10px;
}
.budget-bar-wrap {
  margin-top: 8px;
}
.budget-bar {
  height: 20px;
  background: var(--hw-gray-200);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
}
.budget-segment {
  height: 100%;
  transition: width 0.5s ease;
}
.budget-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.budget-legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--hw-gray-600);
}
.budget-legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Risk Analysis ── */
.risk-box {
  background: #fffbf5;
  border: 1px solid #ffe0c2;
  border-radius: var(--radius-xs);
  padding: 12px;
  margin-top: 10px;
}
.risk-box .risk-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--hw-orange-dark);
  margin-bottom: 6px;
}
.risk-item {
  font-size: 12px;
  color: var(--hw-gray-600);
  line-height: 1.6;
  padding-left: 14px;
  position: relative;
  margin-bottom: 2px;
}
.risk-item::before {
  content: '';
  position: absolute;
  left: 0; top: 7px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--hw-orange);
}

/* ── Responsive ── */
@media (max-width: 480px) {
  body { align-items: stretch; }
  .chat-container { max-height: none; border-radius: 0; }
}
</style>
</head>
<body>

<div class="chat-container mode-customer" id="chatContainer">
  <div class="chat-header">
    <div class="header-avatar" id="headerAvatar">H</div>
    <div class="header-info">
      <h1 id="headerTitle">한화생명 보험 상담</h1>
      <p id="headerSub">AI 상담사가 도와드립니다</p>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tabCustomer" onclick="switchMode('customer')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      고객 상담
    </button>
    <button class="tab-btn" id="tabInternal" onclick="switchMode('internal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      사내 업무
    </button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-area">
    <input type="text" class="chat-input" id="chatInput" placeholder="궁금한 점을 입력하세요..." autocomplete="off">
    <button class="send-btn" id="sendBtn" aria-label="전송">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="disclaimer">본 상담은 참고용이며, 실제 가입은 공식 채널에서 진행해주세요.</div>
</div>

<script>
// ── Data ──
let DATA = null;

async function loadData() {
  const res = await fetch('products.json');
  DATA = await res.json();
  showWelcomeForMode();
}

// ── Mode State ──
let currentMode = 'customer'; // 'customer' | 'internal'
const modeState = {
  customer: { chatHTML: '', chatHistory: [], initialized: false },
  internal: { chatHTML: '', chatHistory: [], initialized: false }
};

// ── DOM ──
const $container = document.getElementById('chatContainer');
const $messages = document.getElementById('chatMessages');
const $input = document.getElementById('chatInput');
const $send = document.getElementById('sendBtn');
const $disclaimer = document.querySelector('.disclaimer');

// ── Mode Switch ──
function switchMode(mode) {
  if (mode === currentMode) return;
  // Save current chat
  modeState[currentMode].chatHTML = $messages.innerHTML;
  // Switch
  currentMode = mode;
  // Update UI theme
  $container.className = 'chat-container mode-' + mode;
  document.getElementById('tabCustomer').classList.toggle('active', mode === 'customer');
  document.getElementById('tabInternal').classList.toggle('active', mode === 'internal');

  if (mode === 'customer') {
    document.getElementById('headerTitle').textContent = '한화생명 보험 상담';
    document.getElementById('headerSub').textContent = 'AI 상담사가 도와드립니다';
    $input.placeholder = '궁금한 점을 입력하세요...';
    $disclaimer.textContent = '본 상담은 참고용이며, 실제 가입은 공식 채널에서 진행해주세요.';
  } else {
    document.getElementById('headerTitle').textContent = '한화생명 사내 어시스턴트';
    document.getElementById('headerSub').textContent = '업무 규정 · 프로세스 검색';
    $input.placeholder = '규정이나 프로세스를 검색하세요...';
    $disclaimer.textContent = '사내 참고용이며, 최종 판단은 관련 부서에 확인하세요.';
  }

  // Restore or init chat
  if (modeState[mode].initialized) {
    $messages.innerHTML = modeState[mode].chatHTML;
    scrollBottom();
  } else {
    $messages.innerHTML = '';
    modeState[mode].initialized = true;
    showWelcomeForMode();
  }
}

function showWelcomeForMode() {
  if (currentMode === 'customer') {
    showCustomerWelcome();
  } else {
    showInternalWelcome();
  }
}

// ── Helpers ──
function scrollBottom() {
  requestAnimationFrame(() => {
    $messages.scrollTop = $messages.scrollHeight;
  });
}

function formatMoney(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(n % 100000000 === 0 ? 0 : 1) + '억원';
  if (n >= 10000) return (n / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '만원';
  return n.toLocaleString() + '원';
}

function addMessage(html, isUser) {
  const div = document.createElement('div');
  div.className = 'message ' + (isUser ? 'user' : 'bot');
  if (isUser) {
    div.innerHTML = `<div class="msg-bubble">${html}</div>`;
  } else {
    div.innerHTML = `<div class="msg-avatar">H</div><div class="msg-bubble">${html}</div>`;
  }
  $messages.appendChild(div);
  scrollBottom();
}

function addBotMessage(html) { addMessage(html, false); }
function addUserMessage(text) { addMessage(text, true); }

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">H</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  $messages.appendChild(div);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function botReply(html, delay) {
  const d = delay || 400 + Math.random() * 400;
  showTyping();
  return new Promise(resolve => {
    setTimeout(() => {
      hideTyping();
      addBotMessage(html);
      resolve();
    }, d);
  });
}

// ── Quick Buttons ──
function makeQuickButtons(buttons) {
  let html = '<div class="quick-buttons">';
  buttons.forEach(b => {
    html += `<button class="quick-btn" onclick="handleQuick('${b.action}')">${b.label}</button>`;
  });
  html += '</div>';
  return html;
}

function handleQuick(action) {
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.style.pointerEvents = 'none';
  });

  // ── Internal mode quick actions ──
  if (currentMode === 'internal') {
    if (action === 'int_underwriting') { addUserMessage('인수심사 기준'); showUnderwriting(); }
    else if (action === 'int_claim') { addUserMessage('보험금 청구 프로세스'); showClaimProcess(); }
    else if (action === 'int_complaint') { addUserMessage('민원 처리 절차'); showComplaintProcess(); }
    else if (action === 'int_products') { addUserMessage('상품 요약'); showInternalProductSummary(); }
    else if (action === 'int_compare') { addUserMessage('상품 비교표'); showInternalCompare(); }
    else if (action === 'int_home') { addUserMessage('메뉴'); showInternalMenu(); }
    else if (action.startsWith('product_')) {
      const code = action.replace('product_', '');
      const p = DATA.products.find(x => x.code === code);
      if (p) { addUserMessage(p.name); showProductDetail(p); }
    }
    return;
  }

  // ── Customer mode quick actions ──
  if (action === 'products') {
    addUserMessage('상품 목록 보기');
    showProductList();
  } else if (action === 'recommend') {
    addUserMessage('맞춤 상품 추천');
    startRecommendQuiz();
  } else if (action === 'faq') {
    addUserMessage('자주 묻는 질문');
    showFAQList();
  } else if (action === 'compare') {
    addUserMessage('상품 비교');
    showCompareMenu();
  } else if (action === 'scenarios') {
    addUserMessage('고객 사례 보기');
    showScenarioList();
  } else if (action.startsWith('product_')) {
    const code = action.replace('product_', '');
    const p = DATA.products.find(x => x.code === code);
    if (p) { addUserMessage(p.name); showProductDetail(p); }
  } else if (action.startsWith('scenario_')) {
    const id = action.replace('scenario_', '');
    const s = DATA.customer_scenarios.find(x => x.id === id);
    if (s) { addUserMessage(s.persona); showScenarioDetail(s); }
  } else if (action.startsWith('faq_')) {
    const idx = parseInt(action.replace('faq_', ''));
    const f = DATA.faq[idx];
    if (f) { addUserMessage(f.question); showFAQAnswer(f); }
  } else if (action.startsWith('compare_')) {
    const type = action.replace('compare_', '');
    addUserMessage(type === 'death' ? '사망보장 비교' : type === 'health' ? '건강보장 비교' : '저축 비교');
    showComparison(type);
  } else if (action.startsWith('quiz_')) {
    processQuizAnswer(action);
  } else if (action === 'home') {
    addUserMessage('처음으로');
    showCustomerMenu();
  }
}

let quizState = {};
const QUIZ_TOTAL_STEPS = 7;
const QUIZ_LABELS = ['연령', '성별', '가족', '생활상황', '건강', '기존보험', '예산'];

function progressBarHTML(step) {
  const pct = Math.round((step / QUIZ_TOTAL_STEPS) * 100);
  return `<div class="quiz-progress">
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-progress-text">${step}/${QUIZ_TOTAL_STEPS}</div>
  </div>`;
}

function startRecommendQuiz() {

}

    await botReply(progressBarHTML(0) + '<div class="quiz-step-label">STEP 1. 연령</div><b>맞춤 상담을 시작합니다.</b><br>연령대를 알려주세요.' + btns);

// ── Recommendation Engine ──
function estimatePremium(product, age, gender) {
  const pt = product.premium_table;
  const gKey = gender === 'male' ? 'male' : 'female';
  const rows = pt['순수보장형'] || pt['표준체'] || null;

  if (!rows || rows.length === 0) {
    if (product.code === 'DIR-005') return gender === 'male' ? 300000 : 300000;
    if (product.code === 'DIR-006') return 500000;
    return 30000;
  }

  const first = rows[0];
  if (first.age !== undefined && first[gKey] !== undefined) {
    // Find closest age
    let closest = rows[0];
    let minDiff = Math.abs(rows[0].age - age);
    for (const r of rows) {
      const diff = Math.abs(r.age - age);
      if (diff < minDiff) { minDiff = diff; closest = r; }
    }
    return closest[gKey];
  }
  return 30000;
}

function runRecommendationEngine() {
  const { age, gender, family, concerns, health, existing, budgetLevel } = quizState;

  // Budget range mapping (만원)
  const budgetMax = { 5: 50000, 15: 150000, 30: 300000, 50: 500000, 100: 1000000, 200: 2000000 }[budgetLevel];

  // ── Score each product ──
  const scores = {};
  DATA.products.forEach(p => {
    scores[p.code] = { base: 0, reasons: [], tips: [], priority: 'optional' };
  });

  const S = scores;
  const hasConcern = (c) => concerns.includes(c);
  const hasFamily = (f) => family === f;
  const isMarried = ['married', 'baby', 'school', 'adult', 'single_parent'].includes(family);
  const hasKids = ['baby', 'school', 'single_parent'].includes(family);
  const isYoung = age <= 35;
  const isMid = age > 35 && age <= 50;
  const isSenior = age > 50;

  // ─ DIR-001 정기보험: 사망보장 ─
  if (isMarried && hasKids) { S['DIR-001'].base += 40; S['DIR-001'].reasons.push('자녀 양육기간 가족 보호를 위한 사망보장이 필수입니다'); }
  if (hasConcern('breadwinner')) { S['DIR-001'].base += 35; S['DIR-001'].reasons.push('외벌이 가장이시므로 사망보장 우선순위가 높습니다'); }
  if (hasConcern('loan')) { S['DIR-001'].base += 30; S['DIR-001'].reasons.push('주택대출 상환 보장으로 가족 부담을 방지합니다'); }
  if (hasFamily('single_parent')) { S['DIR-001'].base += 35; S['DIR-001'].reasons.push('한부모 가정이므로 자녀를 위한 사망보장이 중요합니다'); }
  if (hasConcern('newborn') || hasConcern('just_married')) { S['DIR-001'].base += 20; S['DIR-001'].reasons.push('새 가정을 시작하는 시기에 기본 사망보장을 갖추세요'); }
  if (budgetLevel <= 30) { S['DIR-001'].tips.push('순수보장형 선택 시 종신보험의 1/10 비용으로 동일한 사망보장'); }
  if (health === 'good') { S['DIR-001'].tips.push('건강체 할인 최대 20% 적용 가능'); }

  // ─ DIR-002 종신보험: 평생 사망보장 ─
  if (isMarried && budgetLevel >= 50) { S['DIR-002'].base += 25; S['DIR-002'].reasons.push('여유 예산으로 평생 사망보장을 갖출 수 있습니다'); }
  if (hasConcern('high_income') && isMarried) { S['DIR-002'].base += 20; S['DIR-002'].reasons.push('고소득자 상속 설계에 종신보험이 유리합니다'); }
  if (isSenior && hasFamily('adult')) { S['DIR-002'].base += 15; S['DIR-002'].reasons.push('상속/유족 생활자금 보장용으로 적합합니다'); }
  if (budgetLevel < 30) { S['DIR-002'].base -= 20; } // 예산 부족 시 감점
  S['DIR-002'].tips.push('체증형 선택 시 물가 상승에 대비하여 보험금 증가');

  // ─ DIR-003 암보험 ─
  if (health === 'family_history') { S['DIR-003'].base += 45; S['DIR-003'].reasons.push('가족력이 있으시므로 암 집중 보장이 매우 중요합니다'); }
  if (gender === 'female') { S['DIR-003'].base += 15; S['DIR-003'].reasons.push('여성 암(유방암 등) 보장이 포함되어 있습니다'); }
  if (existing === 'none' || existing === 'silson') { S['DIR-003'].base += 25; S['DIR-003'].reasons.push('현재 암보장이 없으시므로 가입을 권장합니다'); }
  if (isMid || isSenior) { S['DIR-003'].base += 10; S['DIR-003'].reasons.push('연령대가 높아질수록 암 발생률이 높아지므로 지금 가입이 유리합니다'); }
  if (isYoung) { S['DIR-003'].tips.push('젊을 때 가입할수록 비갱신 보험료가 저렴합니다'); }
  S['DIR-003'].tips.push('비갱신형이라 가입 시 보험료가 만기까지 동결');

  // ─ DIR-004 건강보험(암뇌심) ─
  S['DIR-004'].base += 15; // 기본 가산 (누구에게나 권장)
  if (existing === 'none') { S['DIR-004'].base += 30; S['DIR-004'].reasons.push('보험이 없으시므로 3대 질병 통합보장이 가장 효율적입니다'); }
  if (existing === 'silson') { S['DIR-004'].base += 25; S['DIR-004'].reasons.push('실손보험만으로는 진단금이 없어 치료비 외 생활비 공백이 생깁니다'); }
  if (health === 'chronic') { S['DIR-004'].base += 20; S['DIR-004'].reasons.push('만성질환이 있으시면 뇌혈관·심장질환 보장이 특히 중요합니다'); S['DIR-004'].tips.push('고혈압 투약 시 인수심사가 필요하며 할증 가능성이 있습니다'); }
  if (health === 'family_history') { S['DIR-004'].base += 15; S['DIR-004'].reasons.push('가족력 감안 시 암 외에 뇌·심장까지 넓게 보장하면 안심입니다'); }
  if (hasConcern('no_insurance')) { S['DIR-004'].base += 20; S['DIR-004'].reasons.push('보험 공백을 가장 효율적으로 메우는 통합 상품입니다'); }

  // ─ DIR-005 연금저축보험 ─
  if (hasConcern('high_income')) { S['DIR-005'].base += 40; S['DIR-005'].reasons.push('고소득자 세액공제 연 최대 79.2만원 환급이 가능합니다'); }
  if (isSenior || hasConcern('retire_soon')) { S['DIR-005'].base += 35; S['DIR-005'].reasons.push('은퇴가 가까우시므로 연금 준비가 시급합니다'); }
  if (isMid) { S['DIR-005'].base += 20; S['DIR-005'].reasons.push('40~50대에 연금저축을 시작하면 은퇴 후 안정적 소득이 됩니다'); }
  if (hasFamily('single')) { S['DIR-005'].base += 15; S['DIR-005'].reasons.push('1인가구는 노후 소득 확보가 더 중요합니다'); }
  if (budgetLevel >= 30) { S['DIR-005'].tips.push('연 600만원 한도까지 납입 시 세액공제 극대화'); }

  // ─ DIR-006 재테크저축보험 ─
  if (hasConcern('saving_goal')) { S['DIR-006'].base += 35; S['DIR-006'].reasons.push('목돈 마련 목표에 비과세 저축보험이 적합합니다'); }
  if (hasConcern('high_income') && budgetLevel >= 50) { S['DIR-006'].base += 25; S['DIR-006'].reasons.push('10년 유지 시 이자소득세 비과세로 절세 효과가 큽니다'); }
  if (isSenior && budgetLevel >= 100) { S['DIR-006'].base += 20; S['DIR-006'].reasons.push('퇴직금 운용 수단으로 원금보장+비과세 조합이 안전합니다'); }
  S['DIR-006'].tips.push('1개월만 유지해도 원금 100% 보장');

  // ─ DIR-007 입원간병비보험 ─
  if (hasFamily('single')) { S['DIR-007'].base += 40; S['DIR-007'].reasons.push('1인가구는 입원 시 간병해줄 가족이 없어 간병보험이 핵심입니다'); }
  if (isSenior) { S['DIR-007'].base += 25; S['DIR-007'].reasons.push('고령일수록 입원 빈도가 높아져 간병비 부담이 커집니다'); }
  if (isMid && hasFamily('single')) { S['DIR-007'].base += 15; S['DIR-007'].reasons.push('중년 1인가구의 최대 리스크는 입원+간병입니다'); }
  if (hasConcern('retire_soon')) { S['DIR-007'].base += 10; S['DIR-007'].reasons.push('은퇴 후 소득이 줄면 간병비가 큰 부담이 됩니다'); }
  S['DIR-007'].tips.push('입원 1일당 최대 10만원, 사유 불문 보장');

  // ─ DIR-008 실손의료비 ─
  if (existing === 'none') { S['DIR-008'].base += 50; S['DIR-008'].reasons.push('실손보험은 모든 전문가가 기본으로 권장하는 필수 보험입니다'); }
  if (existing === 'silson' || existing === 'basic' || existing === 'many') { S['DIR-008'].base -= 50; } // 이미 있으면 제외
  if (hasConcern('no_insurance')) { S['DIR-008'].base += 20; S['DIR-008'].reasons.push('보험 공백 해소의 첫 번째 단계는 실손보험입니다'); }
  S['DIR-008'].tips.push('급여+비급여 모두 보장, 24시간 앱 청구 가능');

  // ── Rank & assign priorities ──
  let ranked = DATA.products.map(p => ({
    product: p,
    score: scores[p.code].base,
    reasons: scores[p.code].reasons,
    tips: scores[p.code].tips,
    premium: estimatePremium(p, age, gender)
  })).filter(r => r.score > 0).sort((a, b) => b.score - a.score);

  // Assign priority
  ranked.forEach((r, i) => {
    if (r.score >= 35) r.priority = 'must';
    else if (r.score >= 15) r.priority = 'recommend';
    else r.priority = 'optional';
  });

  // Budget-aware: fit within budget
  let totalPremium = 0;
  const fitted = [];
  for (const r of ranked) {
    let est = r.premium;
    // Adjust premium for specific products
    if (r.product.code === 'DIR-005') est = Math.min(budgetMax * 0.3, 1000000);
    if (r.product.code === 'DIR-006') est = Math.min(budgetMax * 0.25, 500000);
    if (r.product.code === 'DIR-003') {
      // 3000만원 기준 (x3)
      est = r.premium * 3;
    }
    r.allocatedPremium = est;

    if (totalPremium + est <= budgetMax || r.priority === 'must') {
      totalPremium += est;
      fitted.push(r);
    } else if (totalPremium < budgetMax) {
      r.allocatedPremium = budgetMax - totalPremium;
      totalPremium = budgetMax;
      fitted.push(r);
    }
  }

  // If nothing passed, take top 3 regardless
  if (fitted.length === 0) {
    ranked.slice(0, 3).forEach(r => fitted.push(r));
    totalPremium = fitted.reduce((s, r) => s + r.allocatedPremium, 0);
  }

  showEnhancedResult(fitted, totalPremium, budgetMax);
}

  if (existing === 'none') risks.push('현재 보험이 전혀 없어 질병/사고 발생 시 전액 자비 부담 위험');
  if (family === 'single' && age >= 40) risks.push('1인가구 중년층 — 입원 시 간병인 확보가 최대 리스크');
  if (concerns.includes('breadwinner') && existing !== 'many') risks.push('외벌이 가장 사망/장해 시 가족 소득이 완전히 중단될 위험');
  if (concerns.includes('loan')) risks.push('대출 상환 중 사망 시 유족에게 부채가 전가될 위험');
  if (health === 'family_history') risks.push('암 가족력이 있어 일반인 대비 암 발생 확률이 높을 수 있음');
  if (health === 'chronic') risks.push('만성질환으로 뇌혈관/심장질환 합병 위험이 높음');
  if (age >= 50 && !concerns.includes('retire_soon') && existing !== 'many') risks.push('50대 이상 건강보험 미가입 시 보험료가 급격히 비싸질 수 있음');
  if (concerns.includes('retire_soon') && !concerns.includes('high_income')) risks.push('은퇴 후 소득 공백 — 연금 준비가 시급');

  if (risks.length > 0) {
    html += '<div class="risk-box"><div class="risk-title">주요 리스크 분석</div>';
    risks.forEach(r => html += `<div class="risk-item">${r}</div>`);
    html += '</div>';
  }

  await botReply(html);

  // ── 2. Portfolio Cards ──
  const priorityLabels = { must: '필수', recommend: '권장', optional: '선택' };
  const priorityClasses = { must: 'priority-must', recommend: 'priority-recommend', optional: 'priority-optional' };
  const segmentColors = ['#ff4444', '#ff6600', '#ff9944', '#ffbb66', '#ffd699', '#ffe5cc', '#f0f0f0', '#ddd'];

  let portfolioHTML = `<b>맞춤 추천 포트폴리오</b><br><span style="font-size:12px;color:#666">${fitted.length}개 상품 · 예상 월 ${Math.round(totalPremium).toLocaleString()}원</span>`;

  fitted.forEach((r, i) => {
    const pClass = r.priority;
    portfolioHTML += `<div class="portfolio-card ${pClass}" onclick="handleQuick('product_${r.product.code}')" style="cursor:pointer">
      <div class="pf-header">
        <div><span class="priority-tag ${priorityClasses[r.priority]}">${priorityLabels[r.priority]}</span> <span style="font-size:11px;color:#999">${r.product.category}</span></div>
        <div class="pf-premium">월 ${Math.round(r.allocatedPremium).toLocaleString()}원</div>
      </div>
      <div class="pf-name">${r.product.name}</div>
      <div class="pf-reason">${r.reasons.length > 0 ? r.reasons[0] : r.product.purpose.substring(0, 60)}</div>`;
    if (r.tips.length > 0) {
      portfolioHTML += `<div class="pf-tip">${r.tips[0]}</div>`;
    }
    portfolioHTML += '</div>';
  });

  await botReply(portfolioHTML);

  // ── 3. Budget Summary ──
  let budgetHTML = '<div class="budget-summary">';
  budgetHTML += `<b style="font-size:13px">예산 배분</b><span style="font-size:12px;color:#666"> — 월 예산 ${budgetMax.toLocaleString()}원 중 ${Math.round(totalPremium).toLocaleString()}원 배분</span>`;
  budgetHTML += '<div class="budget-bar-wrap"><div class="budget-bar">';
  fitted.forEach((r, i) => {
    const pct = Math.max((r.allocatedPremium / budgetMax) * 100, 2);
    budgetHTML += `<div class="budget-segment" style="width:${pct}%;background:${segmentColors[i]}"></div>`;
  });
  const remainPct = Math.max(((budgetMax - totalPremium) / budgetMax) * 100, 0);
  if (remainPct > 0) budgetHTML += `<div class="budget-segment" style="width:${remainPct}%;background:#e8e8e8"></div>`;
  budgetHTML += '</div></div>';
  budgetHTML += '<div class="budget-legend">';
  fitted.forEach((r, i) => {
    budgetHTML += `<div class="budget-legend-item"><span class="budget-legend-dot" style="background:${segmentColors[i]}"></span>${r.product.category} ${Math.round(r.allocatedPremium/totalPremium*100)}%</div>`;
  });
  if (remainPct > 2) budgetHTML += `<div class="budget-legend-item"><span class="budget-legend-dot" style="background:#e8e8e8"></span>여유분 ${Math.round(remainPct)}%</div>`;
  budgetHTML += '</div></div>';

  // Additional reasons (2nd+ reasons)
  const extraReasons = [];
  fitted.forEach(r => {
    r.reasons.slice(1).forEach(reason => {
      extraReasons.push(`<b>${r.product.category}</b>: ${reason}`);
    });
  });
  if (extraReasons.length > 0) {
    budgetHTML += '<div style="margin-top:10px;font-size:12px;color:#666"><b>추가 고려사항</b>';
    extraReasons.forEach(r => budgetHTML += `<div class="risk-item">${r}</div>`);
    budgetHTML += '</div>';
  }

  await botReply(budgetHTML);

  // ── 4. Scenario matching ──
  const scenarioScores = DATA.customer_scenarios.map(sc => {
    let score = 0;
    // Age proximity
    const scAge = parseInt(sc.persona.match(/(\d+)세/)?.[1] || 0);
    score += Math.max(0, 20 - Math.abs(scAge - age));
    // Gender
    const scGender = sc.persona.includes('남성') ? 'male' : 'female';
    if (scGender === gender) score += 10;
    // Family
    if (sc.background.includes('자녀') && hasKidsLocal()) score += 10;
    if (sc.background.includes('미혼') && family === 'single') score += 15;
    if (sc.background.includes('1인') && family === 'single') score += 15;
    // Concerns overlap
    if (sc.background.includes('대출') && concerns.includes('loan')) score += 10;
    if (sc.concern.includes('은퇴') && concerns.includes('retire_soon')) score += 15;
    if (sc.concern.includes('간병') && family === 'single') score += 10;
    if (sc.concern.includes('가족력') && health === 'family_history') score += 15;
    if (sc.concern.includes('암') && health === 'family_history') score += 10;
    return { scenario: sc, score };
  }).sort((a, b) => b.score - a.score);

  function hasKidsLocal() { return ['baby','school','single_parent'].includes(family); }

  const bestMatch = scenarioScores[0];
  if (bestMatch.score >= 15) {
    let matchHTML = `<b>비슷한 고객 사례</b>`;
    matchHTML += `<div class="product-card" onclick="handleQuick('scenario_${bestMatch.scenario.id}')">
      <div class="card-category">유사도 ${Math.min(Math.round(bestMatch.score * 2), 95)}%</div>
      <div class="card-name">${bestMatch.scenario.persona}</div>
      <div class="card-desc">${bestMatch.scenario.background}</div>
    </div>`;

    // Health warnings
    if (health === 'chronic') {
      matchHTML += '<div style="margin-top:8px;font-size:12px;padding:10px;background:#fff3f3;border-radius:6px;border:1px solid #ffd5d5;color:#cc3333">만성질환이 있으시면 가입 시 <b>인수심사</b>가 필요할 수 있습니다. 정확한 가입 가능 여부는 한화생명 고객센터(1588-6363)에서 확인해주세요.</div>';
    }
    if (health === 'smoker') {
      matchHTML += '<div style="margin-top:8px;font-size:12px;padding:10px;background:#fff8f0;border-radius:6px;border:1px solid #ffe0b8;color:#996600">흡연자는 비흡연체 할인(최대 31%)이 불가합니다. 금연 1년 후 재심사를 받으시면 할인 적용이 가능합니다.</div>';
    }

    await botReply(matchHTML);
  }

  // ── 5. Next actions ──
  const btns = makeQuickButtons([
    { label: '상품 상세 보기', action: 'products' },
    { label: '상품 비교', action: 'compare' },
    { label: '다시 상담받기', action: 'recommend' },
    { label: '처음으로', action: 'home' }
  ]);
  await botReply('상품 카드를 클릭하면 상세 정보를 볼 수 있어요.' + btns);
}

// ── Claude API Chat (mode-aware) ──
async function callClaudeAPI(userText) {
  const state = modeState[currentMode];
  state.chatHistory.push({ role: 'user', content: userText });
  if (state.chatHistory.length > 20) state.chatHistory = state.chatHistory.slice(-20);

  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: state.chatHistory, mode: currentMode })
  });

  const data = await res.json();
  if (res.ok && data.reply) {
    state.chatHistory.push({ role: 'assistant', content: data.reply });
    return data.reply;
  } else {
    throw new Error(data.error || 'API 호출 실패');
  }
}

// ── Handle User Input ──
async function handleUserInput(text) {
  if (!text.trim()) return;
  addUserMessage(text);
  $input.value = '';

  // All text input → Claude API (mode-specific prompt on server)
  showTyping();
  try {
    const reply = await callClaudeAPI(text);
    hideTyping();
    addBotMessage(reply);
  } catch (err) {
    hideTyping();
    addBotMessage('죄송합니다, 일시적인 오류가 발생했습니다.<br><span style="font-size:11px;color:#999">' + err.message + '</span>');
  }
}

// ── Event Listeners ──
$send.addEventListener('click', () => handleUserInput($input.value));
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.isComposing) handleUserInput($input.value);
});

// ── Init ──
loadData();
</script>
